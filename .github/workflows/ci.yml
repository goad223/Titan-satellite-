name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[all,dev]"
      - name: Run tests with coverage (min 80%)
        run: pytest
  test-minimal:
    # Verify the package works without the heavy optional dependencies.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install minimal dependencies only
        run: |
          python -m pip install --upgrade pip
          pip install numpy Pillow psutil pytest pytest-cov
      - name: Run tests (optional-format tests auto-skip)
        run: pytest --cov-fail-under=0
      - name: Smoke-test CLIs without heavy deps
        run: |
          python scripts/titan_info.py
          python scripts/titan_preprocess.py --help
